<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新池工作台 - 商务提成分析</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">X</div>
        <div>
          <strong>新池集团</strong>
          <span>新池工作台</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="主导航">
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">♙</span>
          客户线索管理
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">▥</span>
          团队数据看板
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">☷</span>
          CRM规则设置
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">▤</span>
          创建寄样订单
        </button>
        <button class="nav-item commission-entry active" data-commission-entry type="button">
          <span class="nav-icon">◎</span>
          达播提成
        </button>
      </nav>

      <button class="collapse-handle" aria-label="收起侧栏">‹</button>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="commission-tabs topbar-tabs" id="commissionTabs">
          <button class="commission-tab" data-page="config" type="button">达播提成规则设置</button>
          <button class="commission-tab active" data-page="aggregate" type="button">达播提成明细</button>
          <button class="commission-tab" data-page="team" type="button">达播关系画板</button>
        </div>
        <div class="user-actions">
          <button class="link-button">返回工作台</button>
          <div class="avatar">BABI</div>
          <span>管理员</span>
        </div>
      </header>

      <section class="content">
        <div class="page-title">
          <div>
            <h1 id="pageHeading">达播提成</h1>
          </div>
          <div class="title-actions">
            <button class="ghost-button" id="importBtn"><span class="button-icon">⇧</span> 批量导入</button>
            <button class="primary-button" id="exportBtn"><span class="button-icon">⇩</span> 导出结算</button>
          </div>
        </div>

        <div class="metric-flow" id="metricFlow"></div>

        <div class="filter-row">
          <label class="search-box" data-filter-extra>
            <span>⌕</span>
            <input id="searchInput" type="search" placeholder="搜索商务/达人UID/品类/订单号" />
          </label>
          <div class="month-control">
            <span class="month-title">结算月份：</span>
            <button class="month-step-button" type="button" data-month-step="-1" aria-label="上个月">‹</button>
            <label class="field-select month-field">
              <span class="month-inline-label">结算月份：</span>
              <input id="monthSelect" type="month" value="2026-05" />
            </label>
            <button class="month-step-button" type="button" data-month-step="1" aria-label="下个月">›</button>
          </div>
          <label class="field-select" data-filter-extra>
            <span>团队：</span>
            <select id="teamSelect">
              <option value="all">全部团队</option>
              <option value="A组">A组</option>
              <option value="B组">B组</option>
              <option value="C组">C组</option>
            </select>
          </label>
          <button class="ghost-button" id="moreFilterBtn" data-filter-extra><span class="button-icon">▽</span> 更多筛选</button>
          <button class="ghost-button" id="clearBtn" data-filter-extra><span class="button-icon">↺</span> 清空</button>
        </div>

        <section class="page-view active" id="aggregatePage" data-page-panel="aggregate">
          <div class="section-grid aggregate-grid">
            <article class="panel wide-panel">
              <div class="panel-head">
                <div>
                  <h2>提成最终聚合</h2>
                </div>
                <div class="panel-tabs">
                  <button class="mini-tab active" data-aggregate-mode="person">按人</button>
                  <button class="mini-tab" data-aggregate-mode="team">按团队</button>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>结算对象</th>
                      <th>归属</th>
                      <th>原始提成</th>
                      <th>绩效/分成</th>
                      <th>补发</th>
                      <th>
                        <button class="sort-button" id="settlementSortBtn" type="button">
                          最终应发 <span id="settlementSortIcon">↓</span>
                        </button>
                      </th>
                      <th>说明</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="settlementBody"></tbody>
                </table>
              </div>
            </article>
          </div>
        </section>

        <section class="page-view" id="transactionsPage" data-page-panel="transactions">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>单条交易计算明细</h2>
              </div>
              <button class="ghost-button" id="onlyInvalidBtn">只看异常</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>订单号</th>
                    <th>商务/团队</th>
                    <th>达人UID</th>
                    <th>产品品类</th>
                    <th>支付金额</th>
                    <th>合作佣金</th>
                    <th>系数</th>
                    <th>最终提成</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="page-view" id="configPage" data-page-panel="config">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>提成系数可编辑配置</h2>
              </div>
              <button class="primary-button" id="saveConfigBtn">保存配置</button>
            </div>

            <div class="config-layout">
              <div class="config-tabs" id="configTabs">
                <button class="config-tab active" data-config-tab="tier">合作佣金提成比例</button>
                <button class="config-tab" data-config-tab="base">专场与新老客</button>
                <button class="config-tab" data-config-tab="incentive">气垫/素颜霜激励</button>
                <button class="config-tab" data-config-tab="performance">个人绩效系数</button>
                <button class="config-tab" data-config-tab="yangjie">A组杨洁特殊规则</button>
                <button class="config-tab" data-config-tab="custom">自定义系数</button>
                <button class="add-coef-button" id="addCustomCoefBtn" type="button" data-add-custom-coef>+ 新增系数</button>
              </div>
              <div class="config-panel" id="configPanel"></div>
            </div>
          </article>
        </section>

        <section class="page-view" id="teamPage" data-page-panel="team">
          <div class="section-grid">
            <article class="panel wide-panel">
              <div class="panel-head">
                <div>
                  <h2>达播关系画板</h2>
                </div>
              </div>
              <div id="teamCards" class="team-cards"></div>
            </article>
            <aside class="panel insight-panel">
              <div class="panel-head compact">
                <h2>负责人公式</h2>
              </div>
              <div class="rule-box">
                <strong>负责人提成</strong>
                <span>团队成员原始提成金额汇总 × 50% × 负责人绩效系数</span>
              </div>
              <div id="leaderRanking" class="ranking-list"></div>
            </aside>
          </div>
        </section>

        <section class="page-view" id="middlePage" data-page-panel="middle">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>中台独立结算</h2>
              </div>
            </div>
            <div class="middle-grid" id="middleGrid"></div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <aside class="drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <span class="drawer-kicker">订单计算详情</span>
        <h3 id="drawerTitle">-</h3>
      </div>
      <button class="icon-button" id="closeDrawer" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <div class="toast" id="toast">已重新计算</div>
  <script src="./app.js"></script>
</body>
</html>
