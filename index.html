<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新池工作台 - 商务提成分析</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">X</div>
        <div>
          <strong>新池集团</strong>
          <span>新池工作台</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="主导航">
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">♙</span>
          客户线索管理
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">▥</span>
          团队数据看板
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">☷</span>
          CRM规则设置
        </button>
        <button class="nav-item" data-placeholder-nav type="button">
          <span class="nav-icon">▤</span>
          创建寄样订单
        </button>
        <button class="nav-item commission-entry active" data-commission-entry type="button">
          <span class="nav-icon">◎</span>
          达播提成
        </button>
      </nav>

      <button class="collapse-handle" aria-label="收起侧栏">‹</button>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="commission-tabs topbar-tabs" id="commissionTabs">
          <button class="commission-tab" data-page="config" type="button">达播提成规则设置</button>
          <button class="commission-tab active" data-page="aggregate" type="button">达播提成明细</button>
          <button class="commission-tab" data-page="team" type="button">达播关系画板</button>
        </div>
        <div class="user-actions">
          <button class="link-button">返回工作台</button>
          <div class="avatar">BABI</div>
          <span>管理员</span>
        </div>
      </header>

      <section class="content">
        <div class="page-title">
          <div>
            <h1 id="pageHeading">达播提成</h1>
          </div>
        </div>

        <div class="metric-flow" id="metricFlow"></div>

        <div class="filter-row">
          <label class="search-box" data-filter-extra>
            <span>⌕</span>
            <input id="searchInput" type="search" placeholder="搜索商务/达人UID/品类/订单号" />
          </label>
          <div class="month-control">
            <span class="month-title">结算月份：</span>
            <button class="month-step-button" type="button" data-month-step="-1" aria-label="上个月">‹</button>
            <label class="field-select month-field">
              <span class="month-inline-label">结算月份：</span>
              <input id="monthSelect" type="month" value="2026-05" />
            </label>
            <button class="month-step-button" type="button" data-month-step="1" aria-label="下个月">›</button>
          </div>
          <label class="field-select" data-filter-extra>
            <span>团队：</span>
            <select id="teamSelect">
              <option value="all">全部团队</option>
              <option value="A组">A组</option>
              <option value="B组">B组</option>
              <option value="C组">C组</option>
            </select>
          </label>
          <button class="ghost-button" id="moreFilterBtn" data-filter-extra><span class="button-icon">▽</span> 更多筛选</button>
          <button class="ghost-button" id="clearBtn" data-filter-extra><span class="button-icon">↺</span> 清空</button>
        </div>

        <section class="page-view active" id="aggregatePage" data-page-panel="aggregate">
          <div class="section-grid aggregate-grid">
            <article class="panel wide-panel">
              <div class="panel-head">
                <div>
                  <h2>提成最终聚合</h2>
                </div>
                <div class="panel-tabs">
                  <button class="mini-tab active" data-aggregate-mode="person">按人</button>
                  <button class="mini-tab" data-aggregate-mode="team">按团队</button>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>结算对象</th>
                      <th>负责人</th>
                      <th>基础提成</th>
                      <th>团队提成</th>
                      <th>绩效系数</th>
                      <th>
                        <button class="sort-button" id="settlementSortBtn" type="button">
                          最终提成 <span id="settlementSortIcon">↓</span>
                        </button>
                      </th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="settlementBody"></tbody>
                </table>
              </div>
            </article>
          </div>
        </section>

        <section class="page-view" id="transactionsPage" data-page-panel="transactions">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>单条交易计算明细</h2>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>订单号</th>
                    <th>商务/团队</th>
                    <th>达人UID</th>
                    <th>产品品类</th>
                    <th>支付金额</th>
                    <th>合作佣金</th>
                    <th>系数</th>
                    <th>最终提成</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="page-view" id="configPage" data-page-panel="config">
          <article class="panel">
            <div class="panel-head config-panel-head">
              <div>
                <h2>提成系数编辑</h2>
              </div>
              <button class="primary-button" id="saveConfigBtn">保存配置</button>
            </div>

            <div class="config-layout">
              <div class="config-tabs" id="configTabs">
                <button class="config-tab active" data-config-tab="tier">提成比例阶梯</button>
                <button class="config-tab" data-config-tab="customer">新客 / 老客系数</button>
                <button class="config-tab" data-config-tab="special">专场系数</button>
                <button class="config-tab" data-config-tab="draw">抽成比例设置</button>
                <button class="config-tab" data-config-tab="category">品类激励系数</button>
                <button class="config-tab" data-config-tab="gsv">GSV 门槛配置</button>
                <button class="config-tab" data-config-tab="excluded">排除产品配置</button>
              </div>
              <div class="config-panel" id="configPanel"></div>
            </div>
          </article>
        </section>

        <section class="page-view" id="teamPage" data-page-panel="team">
          <div class="org-board-page">
            <div class="org-board-toolbar">
              <h2>组织架构画板</h2>
              <div class="org-month-switch">
                <button type="button" data-month-step="-1" aria-label="上个月">‹</button>
                <label>
                  <span>▦</span>
                  <input type="month" value="2026-05" data-org-month />
                </label>
                <button type="button" data-month-step="1" aria-label="下个月">›</button>
              </div>
              <div class="org-toolbar-actions">
                <button class="ghost-button small-button" type="button">人员绩效系数</button>
                <button class="ghost-button small-button" type="button">▣ 复制上月组织架构</button>
                <button class="ghost-button small-button" type="button">重置视图</button>
                <button class="primary-button small-button" type="button">保存</button>
              </div>
            </div>

            <div class="org-board-shell">
              <aside class="org-people-panel">
                <div class="org-panel-title">
                  <h3>人员列表</h3>
                  <span>拖拽到画布</span>
                </div>
                <label class="org-search">
                  <span>⌕</span>
                  <input id="orgPeopleSearch" type="search" placeholder="搜索姓名" />
                </label>
                <div id="orgPeopleList" class="org-people-list"></div>
              </aside>

              <div class="org-canvas">
                <svg class="org-links" viewBox="0 0 1160 620" preserveAspectRatio="none" aria-hidden="true">
                  <path d="M585 120 C480 170 410 180 365 260" />
                  <path d="M585 120 C700 178 720 190 760 260" />
                  <path d="M365 340 C300 420 292 440 274 500" />
                  <path d="M365 340 C430 430 430 455 438 520" />
                  <path d="M760 340 C820 420 825 450 835 500" />
                </svg>
                <div id="orgNodes" class="org-nodes"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page-view" id="middlePage" data-page-panel="middle">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>中台独立结算</h2>
              </div>
            </div>
            <div class="middle-grid" id="middleGrid"></div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <aside class="drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <span class="drawer-kicker">订单计算详情</span>
        <h3 id="drawerTitle">-</h3>
      </div>
      <button class="icon-button" id="closeDrawer" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <div class="modal-backdrop" id="tierModal" aria-hidden="true">
    <div class="coef-modal" role="dialog" aria-modal="true" aria-labelledby="tierModalTitle">
      <button class="modal-close" type="button" data-tier-modal-close aria-label="关闭">×</button>
      <h3 id="tierModalTitle">编辑档位</h3>
      <div class="modal-form" id="tierModalBody"></div>
      <div class="modal-actions">
        <button class="ghost-button" type="button" data-tier-modal-close>取消</button>
        <button class="primary-button" type="button" data-tier-modal-confirm>确定</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="baseDetailModal" aria-hidden="true">
    <div class="base-detail-modal" role="dialog" aria-modal="true" aria-labelledby="baseDetailTitle">
      <button class="modal-close" type="button" data-base-modal-close aria-label="关闭">×</button>
      <h3 id="baseDetailTitle">基础提成明细</h3>
      <div id="baseDetailBody" class="base-detail-body"></div>
      <div class="base-detail-actions">
        <button class="ghost-button" type="button" data-export-base-detail><span class="button-icon">⇩</span> 导出当前商务明细</button>
        <button class="ghost-button" type="button" data-base-modal-close>关闭</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已重新计算</div>
  <script src="./app.js"></script>
</body>
</html>
