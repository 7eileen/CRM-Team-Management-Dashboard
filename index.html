<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>达人管理 CRM 看板</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="icon-board" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="18" rx="2"></rect>
      <rect x="14" y="3" width="7" height="10" rx="2"></rect>
      <path d="M14 17h7"></path>
      <path d="M14 21h5"></path>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
      <circle cx="9" cy="7" r="4"></circle>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
    </symbol>
    <symbol id="icon-funnel" viewBox="0 0 24 24">
      <path d="M3 4h18l-7 8v6l-4 2v-8L3 4Z"></path>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </symbol>
    <symbol id="icon-filter" viewBox="0 0 24 24">
      <path d="M3 5h18"></path>
      <path d="M7 12h10"></path>
      <path d="M10 19h4"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-download" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <path d="M7 10l5 5 5-5"></path>
      <path d="M12 15V3"></path>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18 6 6 18"></path>
      <path d="m6 6 12 12"></path>
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24">
      <path d="M5 12h14"></path>
      <path d="m12 5 7 7-7 7"></path>
    </symbol>
    <symbol id="icon-alert" viewBox="0 0 24 24">
      <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"></path>
      <path d="M12 9v4"></path>
      <path d="M12 17h.01"></path>
    </symbol>
    <symbol id="icon-target" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"></circle>
      <circle cx="12" cy="12" r="5"></circle>
      <circle cx="12" cy="12" r="1"></circle>
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path d="M12 20h9"></path>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
    </symbol>
  </svg>

  <div class="app-shell">
    <aside class="sidebar" aria-label="达人 CRM 导航">
      <div class="brand">
        <div class="brand-mark">达</div>
        <div>
          <strong>达人 CRM</strong>
          <span>跟进管理</span>
        </div>
      </div>

      <nav class="side-nav">
        <button class="nav-item active" type="button" data-view="pipeline" aria-current="page">
          <svg><use href="#icon-board"></use></svg>
          跟进流水线
        </button>
        <button class="nav-item" type="button" data-view="insight">
          <svg><use href="#icon-funnel"></use></svg>
          数据分析
        </button>
        <button class="nav-item" type="button" data-view="directory">
          <svg><use href="#icon-users"></use></svg>
          达人列表
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>最后更新</span>
        <strong id="lastUpdate">--</strong>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="page-heading">
          <span class="eyebrow">Influencer Operations</span>
          <h1>达人管理 CRM 看板</h1>
        </div>

        <div class="toolbar" aria-label="筛选与操作">
          <label class="search-field">
            <svg><use href="#icon-search"></use></svg>
            <input id="searchInput" type="search" placeholder="搜索达人、产品、商务、卡点" autocomplete="off" />
          </label>
          <button class="icon-button" id="resetFiltersBtn" type="button" aria-label="重置筛选" title="重置筛选">
            <svg><use href="#icon-filter"></use></svg>
          </button>
          <button class="icon-button" id="exportBtn" type="button" aria-label="导出 CSV" title="导出 CSV">
            <svg><use href="#icon-download"></use></svg>
          </button>
          <button class="primary-button" id="addRecordBtn" type="button">
            <svg><use href="#icon-plus"></use></svg>
            添加达人
          </button>
        </div>
      </header>

      <section class="filter-strip" aria-label="达人筛选">
        <label class="select-field">
          <span>产品</span>
          <select id="filterProduct"></select>
        </label>
        <label class="select-field">
          <span>组别</span>
          <select id="filterGroup"></select>
        </label>
        <label class="select-field">
          <span>玩法</span>
          <select id="filterFormat"></select>
        </label>
        <label class="select-field">
          <span>类型</span>
          <select id="filterType"></select>
        </label>
        <label class="select-field">
          <span>等级</span>
          <select id="filterTier"></select>
        </label>
        <label class="select-field">
          <span>状态</span>
          <select id="filterStage"></select>
        </label>
        <label class="select-field">
          <span>商务</span>
          <select id="filterPerson"></select>
        </label>
      </section>

      <section class="content">
        <div class="kpi-grid" id="kpiGrid"></div>

        <section class="page-view active" data-page="pipeline" id="pipelinePage">
          <div class="page-layout">
            <article class="panel pipeline-panel">
              <div class="panel-head">
                <div>
                  <span class="panel-kicker">Pipeline</span>
                  <h2>达人跟进流水线</h2>
                </div>
                <div class="legend" id="tierLegend"></div>
              </div>
              <div class="kanban-columns" id="kanbanColumns"></div>
            </article>

            <aside class="side-panels">
              <article class="panel">
                <div class="panel-head compact">
                  <div>
                    <span class="panel-kicker">Blocked</span>
                    <h2>卡点 / 阻塞项</h2>
                  </div>
                </div>
                <div class="bottleneck-list" id="bottleneckList"></div>
              </article>

              <article class="panel">
                <div class="panel-head compact">
                  <div>
                    <span class="panel-kicker">Owners</span>
                    <h2>商务跟进量</h2>
                  </div>
                </div>
                <div class="owner-list" id="ownerList"></div>
              </article>
            </aside>
          </div>
        </section>

        <section class="page-view" data-page="insight" id="insightPage">
          <div class="insight-grid">
            <article class="panel">
              <div class="panel-head">
                <div>
                  <span class="panel-kicker">Funnel</span>
                  <h2>流水线漏斗</h2>
                </div>
              </div>
              <div class="funnel-chart" id="funnelChart"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <span class="panel-kicker">Type</span>
                  <h2>达人类型分布</h2>
                </div>
              </div>
              <div class="bar-chart" id="typeChart"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <span class="panel-kicker">Group</span>
                  <h2>各组活跃达人</h2>
                </div>
              </div>
              <div class="stack-chart" id="groupChart"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <span class="panel-kicker">Mix</span>
                  <h2>玩法结构</h2>
                </div>
              </div>
              <div class="format-grid" id="formatGrid"></div>
            </article>
          </div>
        </section>

        <section class="page-view" data-page="directory" id="directoryPage">
          <div class="panel">
            <div class="panel-head">
              <div>
                <span class="panel-kicker">Directory</span>
                <h2>达人列表</h2>
              </div>
              <span class="table-count" id="tableCount">0 条记录</span>
            </div>
            <div class="table-wrap">
              <table class="record-table">
                <thead>
                  <tr>
                    <th>达人</th>
                    <th>等级</th>
                    <th>类型</th>
                    <th>产品</th>
                    <th>组别</th>
                    <th>玩法</th>
                    <th>状态</th>
                    <th>商务</th>
                    <th>卡点</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="recordTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="detail-drawer" id="detailDrawer" aria-hidden="true" aria-labelledby="drawerTitle">
    <div class="drawer-head">
      <div>
        <span class="drawer-kicker" id="drawerKicker">达人详情</span>
        <h3 id="drawerTitle">-</h3>
      </div>
      <button class="icon-button" id="drawerCloseBtn" type="button" aria-label="关闭详情">
        <svg><use href="#icon-x"></use></svg>
      </button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./app.js" defer></script>
</body>
</html>
